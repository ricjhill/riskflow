name: marine_cargo
fields:
  Vessel_Name:
    type: string
    required: true
    not_empty: true
  Voyage_Date:
    type: date
    required: true
  Arrival_Date:
    type: date
    required: true
  Cargo_Value:
    type: float
    required: true
    non_negative: true
  Premium:
    type: float
    required: true
    non_negative: true
  Currency:
    type: currency
    required: true
    allowed_values: [USD, GBP, EUR, JPY, SGD, HKD]
  Port_Of_Loading:
    type: string
    required: true
    not_empty: true
  Port_Of_Discharge:
    type: string
    required: false
cross_field_rules:
  - earlier: Voyage_Date
    later: Arrival_Date
slm_hints:
  - source_alias: Ship
    target: Vessel_Name
  - source_alias: Vessel
    target: Vessel_Name
  - source_alias: Departure
    target: Voyage_Date
  - source_alias: Sailing Date
    target: Voyage_Date
  - source_alias: ETA
    target: Arrival_Date
  - source_alias: Cargo Value
    target: Cargo_Value
  - source_alias: Sum Insured
    target: Cargo_Value
  - source_alias: GWP
    target: Premium
  - source_alias: Ccy
    target: Currency
  - source_alias: Loading Port
    target: Port_Of_Loading
  - source_alias: Origin
    target: Port_Of_Loading
  - source_alias: Destination
    target: Port_Of_Discharge
  - source_alias: Discharge Port
    target: Port_Of_Discharge
