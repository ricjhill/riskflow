services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/.venv
  gui:
    build:
      context: .
      dockerfile: gui/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - RISKFLOW_API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./schemas:/app/schemas:ro
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"