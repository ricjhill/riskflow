name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest -x -v tests/unit/

      - name: Run wiring tests
        run: uv run pytest -x -v tests/wiring/

      - name: Type check
        run: uv run mypy src/

      - name: Lint
        run: uv run ruff check src/

      - name: Format check
        run: uv run ruff format --check src/

      - name: Architecture boundary check
        run: uv run python -m tools.hexagonal_linter

  boot-test:
    needs: quality
    runs-on: ubuntu-latest
    # Only run when source code, Dockerfile, or compose config changes
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check for app changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'src/**'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'pyproject.toml'
              - 'uv.lock'

      - name: Build and start containers
        if: steps.changes.outputs.app == 'true'
        run: |
          # Create minimal .env for boot test (no real API key needed for health check)
          echo "GROQ_API_KEY=test_key_for_boot_check" > .env
          docker compose up -d --build
          echo "Waiting for app to start..."
          sleep 5

      - name: Health check
        if: steps.changes.outputs.app == 'true'
        run: |
          curl --fail --retry 5 --retry-delay 2 --retry-all-errors http://localhost:8000/health
          echo "Boot test passed: /health returned 200"

      - name: Tear down
        if: steps.changes.outputs.app == 'true' && always()
        run: docker compose down

  security:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Bandit security scan
        run: uv run bandit -r src/ -q

      - name: Dependency audit
        # CVE-2026-4539: pygments 2.19.2 — no patched version available as of 2026-03-26.
        # Tracked in security-scan.sh hook with the same ignore.
        # pygments is a dev dep (via rich) not exposed to users. Low risk.
        run: uv run pip-audit --ignore-vuln CVE-2026-4539

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    # Only run on push to main (not on PRs) to avoid burning API credits on every PR
    # Requires GROQ_API_KEY secret in repo settings
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run e2e tests (real Groq API)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: uv run pytest -x -v -m e2e
