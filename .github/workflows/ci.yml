name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: >-
          uv run pytest -x -v tests/unit/
          --junitxml=reports/unit.xml
          --cov=src
          --cov-report=xml:reports/coverage.xml
          --cov-report=json:reports/coverage.json
          --cov-report=term-missing

      - name: Coverage delta check
        if: github.event_name == 'pull_request'
        run: >-
          uv run diff-cover reports/coverage.xml
          --compare-branch=origin/main
          --fail-under=80
          --include "src/adapters/*" "src/domain/*" "src/ports/*"

      - name: Run integration tests
        run: uv run pytest -x -v tests/integration/ --junitxml=reports/integration.xml

      - name: Run contract tests
        run: uv run pytest -x -v tests/contract/ --junitxml=reports/contract.xml

      - name: Run performance guardrails
        run: uv run pytest -x -v tests/benchmark/ --benchmark-disable -p no:xdist --junitxml=reports/benchmark.xml

      - name: Run load test assertions
        run: uv run pytest -x -v tests/load/test_locust_ci.py --junitxml=reports/load.xml
        timeout-minutes: 5

      - name: Type check
        run: uv run mypy src/

      - name: Lint
        run: uv run ruff check src/

      - name: Format check
        run: uv run ruff format --check src/

      - name: Architecture boundary check
        run: uv run python -m tools.hexagonal_linter

      - name: OpenAPI spec staleness check
        run: |
          uv run python -m tools.export_openapi openapi.generated.json
          diff openapi.json openapi.generated.json || (echo "openapi.json is stale — run: uv run python -m tools.export_openapi" && exit 1)
          rm openapi.generated.json

      - name: Coverage summary
        if: always() && hashFiles('reports/coverage.json') != ''
        run: uv run python -m tools.coverage_report --no-run >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && hashFiles('reports/coverage.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const mdBody = execSync(
              'uv run python -m tools.coverage_report --no-run --markdown',
              { encoding: 'utf-8', cwd: process.cwd() }
            ).trim();

            const marker = '<!-- coverage-report -->';
            const body = marker + '\n' + mdBody + '\n\n_Updated by CI on every push._';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: reports/
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Test Results
          path: "reports/unit.xml,reports/integration.xml,reports/contract.xml,reports/benchmark.xml,reports/load.xml"
          reporter: java-junit

  boot-test:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    # Only run when source code, Dockerfile, or compose config changes
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Check for app changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app:
              - 'src/**'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'pyproject.toml'
              - 'uv.lock'

      - name: Build and start containers
        if: steps.changes.outputs.app == 'true'
        run: |
          # Create minimal .env for boot test (no real API key needed for health check)
          echo "GROQ_API_KEY=test_key_for_boot_check" > .env
          docker compose up -d --build
          echo "Waiting for app to start..."
          sleep 5

      - name: Functional smoke tests
        if: steps.changes.outputs.app == 'true'
        run: |
          BASE=http://localhost:8000

          # 1. Health — also serves as readiness check with retries
          curl --fail --retry 5 --retry-delay 2 --retry-all-errors $BASE/health
          echo "PASS: GET /health"

          # 2. Schemas — verify both schemas loaded from YAML
          SCHEMAS=$(curl -sf $BASE/schemas)
          echo "$SCHEMAS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          schemas = data['schemas']
          assert 'standard_reinsurance' in schemas, f'Missing standard_reinsurance: {schemas}'
          assert 'marine_cargo' in schemas, f'Missing marine_cargo: {schemas}'
          print(f'PASS: GET /schemas — {len(schemas)} schemas loaded')
          "

          # 3. Upload CSV — expect 503 (SLM unavailable with dummy key)
          UPLOAD=$(curl -s -o /dev/null -w '%{http_code}' \
            -F "file=@tests/fixtures/sample_bordereaux.csv" $BASE/upload)
          if [ "$UPLOAD" = "503" ]; then
            echo "PASS: POST /upload — 503 (SLM unavailable, expected with dummy key)"
          elif [ "$UPLOAD" = "200" ]; then
            echo "PASS: POST /upload — 200 (unexpected but valid)"
          else
            echo "FAIL: POST /upload — got $UPLOAD, expected 503 or 200"
            exit 1
          fi

          # 4. Upload with schema param — proves schema registry + routing
          UPLOAD_SCHEMA=$(curl -s -o /dev/null -w '%{http_code}' \
            -F "file=@tests/fixtures/sample_marine_cargo.csv" "$BASE/upload?schema=marine_cargo")
          if [ "$UPLOAD_SCHEMA" = "503" ] || [ "$UPLOAD_SCHEMA" = "200" ]; then
            echo "PASS: POST /upload?schema=marine_cargo — $UPLOAD_SCHEMA"
          else
            echo "FAIL: POST /upload?schema=marine_cargo — got $UPLOAD_SCHEMA"
            exit 1
          fi

          # 5. Sheets endpoint — CSV returns empty sheets list
          SHEETS=$(curl -s -o /dev/null -w '%{http_code}' \
            -F "file=@tests/fixtures/sample_bordereaux.csv" $BASE/sheets)
          [ "$SHEETS" = "200" ] && echo "PASS: POST /sheets — 200" || { echo "FAIL: POST /sheets — $SHEETS"; exit 1; }

          # 6. Async upload — expect 202 then job completes or fails
          ASYNC=$(curl -sf -F "file=@tests/fixtures/sample_bordereaux.csv" $BASE/upload/async)
          JOB_ID=$(echo "$ASYNC" | python3 -c "import json,sys; print(json.load(sys.stdin)['job_id'])")
          echo "PASS: POST /upload/async — 202, job_id=$JOB_ID"

          # Poll job status (should reach terminal state within 10s)
          for i in $(seq 1 20); do
            JOB=$(curl -sf "$BASE/jobs/$JOB_ID")
            STATUS=$(echo "$JOB" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
            if [ "$STATUS" != "pending" ] && [ "$STATUS" != "processing" ]; then
              echo "PASS: GET /jobs/$JOB_ID — status=$STATUS"
              break
            fi
            sleep 0.5
          done
          if [ "$STATUS" = "pending" ] || [ "$STATUS" = "processing" ]; then
            echo "FAIL: GET /jobs/$JOB_ID — timed out waiting for terminal state (last=$STATUS)"
            exit 1
          fi

          # 7. Corrections — store a human-verified mapping
          CORR=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST -H "Content-Type: application/json" \
            -d '{"cedent_id":"boot-test","corrections":[{"source_header":"GWP","target_field":"Gross_Premium"}]}' \
            $BASE/corrections)
          [ "$CORR" = "201" ] && echo "PASS: POST /corrections — 201" || { echo "FAIL: POST /corrections — $CORR"; exit 1; }

          # 8. File validation — bad file type should return 400
          BAD=$(curl -s -o /dev/null -w '%{http_code}' \
            -F "file=@README.md;type=text/plain;filename=bad.txt" $BASE/upload)
          [ "$BAD" = "400" ] && echo "PASS: POST /upload bad file — 400" || { echo "FAIL: POST /upload bad file — $BAD"; exit 1; }

          echo "All functional smoke tests passed."

      - name: Tear down
        if: steps.changes.outputs.app == 'true' && always()
        run: docker compose down

  concurrency-test:
    needs: boot-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    # Only run on PRs when app code changes
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Check for app changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app:
              - 'src/**'
              - 'Dockerfile'
              - 'docker-compose.yml'

      - name: Install uv and deps
        if: steps.changes.outputs.app == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Set up Python and install deps
        if: steps.changes.outputs.app == 'true'
        run: |
          uv python install 3.12
          uv sync --frozen

      - name: Build and start stack
        if: steps.changes.outputs.app == 'true'
        run: |
          echo "GROQ_API_KEY=test_key" > .env
          docker compose up -d --build
          curl --fail --retry 10 --retry-delay 2 --retry-all-errors http://localhost:8000/health

      - name: Run Locust 5-user test against Docker stack
        if: steps.changes.outputs.app == 'true'
        run: |
          uv run locust -f tests/load/locustfile.py \
            --host http://localhost:8000 \
            --headless --users 5 --spawn-rate 5 --run-time 30s \
            --csv=reports/concurrency
          # Assert results
          uv run python -c "
          import csv, sys
          with open('reports/concurrency_stats.csv') as f:
              rows = list(csv.DictReader(f))
          agg = next(r for r in rows if r['Name'] == 'Aggregated')
          total = int(agg['Request Count'])
          rps = float(agg.get('Requests/s', 0))
          print(f'Requests: {total}, RPS: {rps:.1f}')
          assert total >= 20, f'Only {total} requests in 30s — possible deadlock'
          assert rps >= 2.0, f'RPS {rps:.1f} below 2.0 — possible deadlock'
          print('PASS: 5-user concurrency test')
          "

      - name: Upload Locust results
        if: steps.changes.outputs.app == 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: concurrency-test-results
          path: reports/concurrency*
          retention-days: 30

      - name: Tear down
        if: steps.changes.outputs.app == 'true' && always()
        run: docker compose down

  security:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Bandit security scan
        run: uv run bandit -r src/ -q

      - name: Dependency audit
        run: uv run pip-audit

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    # Only run on push to main (not on PRs) to avoid burning API credits on every PR
    # Requires GROQ_API_KEY secret in repo settings
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run e2e tests (real Groq API)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: uv run pytest -x -v -m e2e --junitxml=reports/e2e.xml

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: reports/
          retention-days: 30

      - name: Publish e2e test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: E2E Test Results
          path: reports/*.xml
          reporter: java-junit
