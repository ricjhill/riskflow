name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -x -v tests/

      - name: Type check
        run: uv run mypy src/

      - name: Lint
        run: uv run ruff check src/

      - name: Format check
        run: uv run ruff format --check src/

  security:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Bandit security scan
        run: uv run bandit -r src/ -q

      - name: Dependency audit
        # CVE-2026-4539: pygments 2.19.2 — no patched version available as of 2026-03-26.
        # Tracked in security-scan.sh hook with the same ignore.
        # pygments is a dev dep (via rich) not exposed to users. Low risk.
        run: uv run pip-audit --ignore-vuln CVE-2026-4539
